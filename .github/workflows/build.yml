name: Build and Release Binaries

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to publish when release publishing is enabled"
        required: false
        default: "v1.2.1"
      release_name:
        description: "Release name to publish when release publishing is enabled"
        required: false
        default: "v1.2.1 - Security & Release Workflow Fixes"
      publish_release:
        description: "Upload build outputs to the GitHub Release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --onefile --windowed --uac-admin
          --add-data "translations.json;."
          --add-data "icon.ico;."
          --add-data "icon_green.ico;."
          --add-data "icon_red.ico;."
          --name "AI-Router-Blocker-AiO"
          --clean ai_blocker.py

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        run: >
          pyinstaller --onefile --windowed
          --add-data "translations.json:."
          --add-data "icon.ico:."
          --add-data "icon_green.ico:."
          --add-data "icon_red.ico:."
          --name "AI-Router-Blocker-AiO"
          --clean ai_blocker.py

      - name: Rename release assets
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv "AI-Router-Blocker-AiO.exe" "AI-Router-Blocker-AiO-Windows.exe"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            if [ -f "AI-Router-Blocker-AiO.app/Contents/MacOS/AI-Router-Blocker-AiO" ]; then
              cp "AI-Router-Blocker-AiO.app/Contents/MacOS/AI-Router-Blocker-AiO" "AI-Router-Blocker-AiO-macOS"
            fi
            if [ -d "AI-Router-Blocker-AiO.app" ]; then
              zip -r "AI-Router-Blocker-AiO-macOS.app.zip" "AI-Router-Blocker-AiO.app"
            fi
          else
            mv "AI-Router-Blocker-AiO" "AI-Router-Blocker-AiO-Linux"
          fi

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AI-Router-Blocker-AiO-${{ runner.os }}
          path: dist/AI-Router-Blocker-AiO-*
          if-no-files-found: error

      - name: Upload GitHub Release assets
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
          name: ${{ github.event.release.name || inputs.release_name }}
          body_path: RELEASE_NOTES.md
          files: dist/AI-Router-Blocker-AiO-*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
