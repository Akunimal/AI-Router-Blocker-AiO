name: Build and Release Binaries

on:
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutar la compilación manualmente desde la pestaña "Actions"
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.1.6)'
        required: false
        default: 'v1.1.6'
      release_name:
        description: 'Release name'
        required: false
        default: 'v1.1.6 - AI DevSec Gateway (Proxy & Auditor)'


permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --uac-admin --add-data "translations.json;." --add-data "icon.ico;." --add-data "icon_green.ico;." --add-data "icon_red.ico;." --name "AI-Router-Blocker-AiO" --clean ai_blocker.py

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --windowed --add-data "translations.json:." --add-data "icon.ico:." --add-data "icon_green.ico:." --add-data "icon_red.ico:." --name "AI-Router-Blocker-AiO" --clean ai_blocker.py

      - name: Rename and zip assets
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv "AI-Router-Blocker-AiO.exe" "AI-Router-Blocker-AiO-Windows.exe"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            if [ -f "AI-Router-Blocker-AiO.app/Contents/MacOS/AI-Router-Blocker-AiO" ]; then
              cp "AI-Router-Blocker-AiO.app/Contents/MacOS/AI-Router-Blocker-AiO" "AI-Router-Blocker-AiO-macOS"
            fi
            zip -r AI-Router-Blocker-AiO-macOS.app.zip AI-Router-Blocker-AiO.app
          else
            mv "AI-Router-Blocker-AiO" "AI-Router-Blocker-AiO-Linux"
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag_name || 'v1.1.6' }}
          name: ${{ github.event.release.name || github.event.inputs.release_name || 'v1.1.6 - AI DevSec Gateway (Proxy & Auditor)' }}
          body: |
            ### 🚀 New Features (AI DevSec Gateway)
            - **Local AI Router**: Transparently bypass cloud APIs and route your editor's AI traffic (Cursor/Windsurf) to your own Local LLMs (Ollama) or personal API keys via `http://127.0.0.1:8080/v1`.
            - **DevSec Auditor**: Real-time integration with OpenAI API to analyze running editors and detect potential data leaks in your dev environment.
            - **Redesigned UI**: Added tabbed navigation and upgraded branding.
          files: dist/AI-Router-Blocker-AiO-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
