name: 💡 Feature Request
description: Propose a new feature, domain category, or enhancement
title: "[FEAT]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make AI DevSec Gateway better? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is (e.g., I'm frustrated when...).
      placeholder: Describe the problem or limitation...
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe your proposed feature or changes...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've considered.
      placeholder: Other options...
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or code examples here.
      placeholder: Any additional details...
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues and verified this feature request is not a duplicate.
          required: true
        - label: I understand that the priority of new features is decided by maintainers based on community interest.
          required: true
